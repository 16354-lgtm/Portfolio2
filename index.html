<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฐิติชญา ชูวัฒน์ | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#240046,#5A189A,#7B2CBF,#9D4EDD);
    display:flex;
    flex-direction:column;
}
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 8%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
}
.logo{
    font-size:28px;
    font-weight:700;
    color:#fff;
}
nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}
nav a{
    text-decoration:none;
    color:#fff;
    font-weight:500;
    transition:.3s;
}
nav a:hover{
    color:#F3D1FF;
}
.hero{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}
.card{
    width:650px;
    max-width:95%;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:30px;
    padding:50px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}
.profile{
    width:170px;
    height:170px;
    margin:auto;
    border-radius:50%;
    padding:5px;
    background:#fff;
}
.profile img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}
h1{
    margin-top:25px;
    color:white;
    font-size:42px;
}
h2{
    margin-top:10px;
    color:#E9D5FF;
    font-weight:500;
}
p{
    margin-top:25px;
    color:white;
    line-height:32px;
    font-size:18px;
}
.btn{
    display:inline-block;
    margin-top:35px;
    padding:15px 40px;
    text-decoration:none;
    border-radius:40px;
    background:#A855F7;
    color:white;
    font-weight:600;
    transition:.3s;
}
.btn:hover{
    background:#C77DFF;
}
footer{
    text-align:center;
    padding:18px;
    color:white;
    background:rgba(255,255,255,.08);
}
@media(max-width:768px){
nav{
    flex-direction:column;
    gap:20px;
}
nav ul{
    flex-wrap:wrap;
    justify-content:center;
}
h1{
    font-size:32px;
}
.card{
    padding:35px;
}
.profile{
    width:140px;
    height:140px;
}
}
</style>
</head>
<body>
<nav>
<div class="logo">
Portfolio
</div>
<ul>
<li><a href="#">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="skills.html">Skills</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
<section class="hero">
<div class="card">
<div class="profile">
<img src="profile.jpg" alt="Profile">
</div>
<h1>ฐิติชญา ชูวัฒน์</h1>
<h2>Student Portfolio</h2>
<p>
นักเรียนระดับชั้นมัธยมศึกษาปีที่ 6<br>
</p>
<a href="about.html" class="btn">
Explore My Portfolio
</a>
</div>
</section>
<footer>
© 2026 | ฐิติชญา ชูวัฒน์
</footer>
</body>
</html>
